---
name: readme

"on":
  push:
    branches:
      - master
    paths:
      - README.md
  workflow_dispatch:

jobs:
  readme:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Push readme
        uses: actionhippie/pushrm@c42e7f2e33691c3d2b2ee8ea31960354960422bf # v1
        if: github.event_name != 'pull_request'
        with:
          provider: dockerhub
          target: webhippie/gitea
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          description: Docker image for gitea
          readme: README.md

      - name: Push readme
        uses: actionhippie/pushrm@c42e7f2e33691c3d2b2ee8ea31960354960422bf # v1
        with:
          provider: quay
          target: quay.io/webhippie/gitea
          apikey: ${{ secrets.QUAY_APIKEY }}
          readme: README.md

...
