---
name: latest

"on":
  push:
    branches:
      - master
    paths:
      - latest/*
      - .github/workflows/docker.yml
  pull_request:
    branches:
      - master
    paths:
      - latest/*
      - .github/workflows/docker.yml
  workflow_dispatch:

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        id: source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          images: |
            webhippie/gitea
            quay.io/webhippie/gitea
            ghcr.io/dockhippie/gitea
          labels: |
            org.opencontainers.image.vendor=Webhippie
            maintainer=Thomas Boerger <thomas@webhippie.de>

      - name: Setup QEMU
        id: qemu
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4

      - name: Setup Buildx
        id: buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Hub login
        id: login1
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        if: github.event_name != 'pull_request'
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Quay login
        id: login2
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        if: github.event_name != 'pull_request'
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}

      - name: Ghcr login
        id: login3
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        if: github.event_name != 'pull_request'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build amd64
        id: amd64
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          builder: ${{ steps.buildx.outputs.name }}
          context: latest/
          provenance: false
          file: latest/Dockerfile.amd64
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          labels: ${{ steps.meta.outputs.labels }}
          tags: |
            webhippie/gitea:latest-amd64
            quay.io/webhippie/gitea:latest-amd64
            ghcr.io/dockhippie/gitea:latest-amd64

      - name: Build arm64
        id: arm64
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          builder: ${{ steps.buildx.outputs.name }}
          context: latest/
          provenance: false
          file: latest/Dockerfile.arm64
          platforms: linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          labels: ${{ steps.meta.outputs.labels }}
          tags: |
            webhippie/gitea:latest-arm64
            quay.io/webhippie/gitea:latest-arm64
            ghcr.io/dockhippie/gitea:latest-arm64

      - name: Build arm
        id: arm
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          builder: ${{ steps.buildx.outputs.name }}
          context: latest/
          provenance: false
          file: latest/Dockerfile.arm
          platforms: linux/arm/v6
          push: ${{ github.event_name != 'pull_request' }}
          labels: ${{ steps.meta.outputs.labels }}
          tags: |
            webhippie/gitea:latest-arm
            quay.io/webhippie/gitea:latest-arm
            ghcr.io/dockhippie/gitea:latest-arm

      - name: Hub manifest
        id: manifest1
        uses: actionhippie/manifest@3a6f40c5b3deb413549b3ced0148245e95a01af4 # v1
        if: github.event_name != 'pull_request'
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          platforms: linux/amd64,linux/arm64,linux/arm/v6
          template: webhippie/gitea:latest-ARCH
          target: webhippie/gitea:latest
          ignore_missing: true

      - name: Quay manifest
        id: manifest2
        uses: actionhippie/manifest@3a6f40c5b3deb413549b3ced0148245e95a01af4 # v1
        if: github.event_name != 'pull_request'
        with:
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}
          platforms: linux/amd64,linux/arm64,linux/arm/v6
          template: quay.io/webhippie/gitea:latest-ARCH
          target: quay.io/webhippie/gitea:latest
          ignore_missing: true

      - name: Ghcr manifest
        id: manifest3
        uses: actionhippie/manifest@3a6f40c5b3deb413549b3ced0148245e95a01af4 # v1
        if: github.event_name != 'pull_request'
        with:
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          platforms: linux/amd64,linux/arm64,linux/arm/v6
          template: ghcr.io/dockhippie/gitea:latest-ARCH
          target: ghcr.io/dockhippie/gitea:latest
          ignore_missing: true

...
